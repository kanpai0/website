# git-cliff configuration
# https://git-cliff.org/docs/configuration

[changelog]
header = "# Changelog\n\n"
body = """
## [{{ version | trim_start_matches(pat="v") }}] — {{ timestamp | date(format="%Y-%m-%d") }}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}
{% for commit in commits %}\
- {{ commit.message | upper_first -}}
{% endfor %}
{% endfor %}
---

"""
footer = ""
trim = true
# Prepend new releases on top (git cliff --prepend)
postprocessors = [
  { pattern = '<!-- \d+ --> ', replace = "" },
]

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_parsers = [
  { message = "^feat",     group = "<!-- 0 --> Features" },
  { message = "^fix",      group = "<!-- 1 --> Bug Fixes" },
  { message = "^perf",     group = "<!-- 2 --> Performance" },
  { message = "^refactor", group = "<!-- 3 --> Refactoring" },
  { message = "^docs",     group = "<!-- 4 --> Documentation" },
  { message = "^style",    group = "<!-- 5 --> Styling" },
  { message = "^test",     group = "<!-- 6 --> Testing" },
  { message = "^build",    group = "<!-- 7 --> Build" },
  { message = "^ci",       group = "<!-- 8 --> CI" },
  { message = "^chore",    group = "Chores", skip = true },
]
filter_commits = true
tag_pattern = "v[0-9].*"
# Breaking changes: commits with "!" bump major
breaking_commits_send_to_headline = true
breaking_commit_log = true
