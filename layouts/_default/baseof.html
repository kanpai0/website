<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <meta name="theme-color" content="#F7F4EE">
  {{- block "head-meta" . }}{{ end }}
  <title>{{ block "title" . }}{{ .Site.Title }}{{ end }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  {{- block "fonts" . }}
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&family=Inter:wght@400;500;600&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&family=Inter:wght@400;500;600&display=swap"></noscript>
  {{- end }}
  <link rel="stylesheet" href="/css/main.css">
  {{- block "head-extra" . }}{{ end }}
</head>
<body{{ block "body-attrs" . }}{{ end }}>
  {{- block "body" . }}{{ end }}
</body>
</html>
