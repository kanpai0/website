<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  {{ if .Params.noindex }}<meta name="robots" content="noindex, nofollow">{{ end }}
  <title>{{ .Title }} — {{ .Site.Title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&family=Inter:wght@400;500;600&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&family=Inter:wght@400;500;600&display=swap"></noscript>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body class="page">

  <header class="site-header">
    <a href="/" class="site-logo">Kanpai Ø</a>
  </header>

  <main class="prose">
    <h1>{{ .Title }}</h1>
    {{ .Content }}
  </main>

  {{ partial "footer.html" . }}

</body>
</html>
