{{- /* Renders a 20×20 SVG icon for the given glass type slug. */ -}}
{{- $type := . -}}
<svg class="glass-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
{{- if eq $type "rocks" -}}
  {{/* Short wide tumbler */}}
  <path d="M5 5h14l-2 14H7L5 5z"/>
  <line x1="5" y1="9" x2="19" y2="9"/>
{{- else if or (eq $type "highball") (eq $type "collins") -}}
  {{/* Tall narrow glass */}}
  <path d="M7 3h10l-2 18H9L7 3z"/>
  <line x1="7" y1="8" x2="17" y2="8"/>
{{- else if eq $type "mule-mug" -}}
  {{/* Mug with handle */}}
  <rect x="5" y="4" width="12" height="14" rx="1"/>
  <path d="M17 8h2a2 2 0 0 1 0 4h-2"/>
  <line x1="5" y1="18" x2="17" y2="18"/>
{{- else if eq $type "coupette" -}}
  {{/* Champagne coupe / cocktail glass */}}
  <path d="M3 5h18l-7 8H10L3 5z"/>
  <line x1="12" y1="13" x2="12" y2="19"/>
  <line x1="9" y1="19" x2="15" y2="19"/>
{{- else if eq $type "martini" -}}
  {{/* V-shaped martini glass */}}
  <path d="M2 4h20l-9 10H11L2 4z"/>
  <line x1="12" y1="14" x2="12" y2="20"/>
  <line x1="9" y1="20" x2="15" y2="20"/>
{{- else if eq $type "margarita" -}}
  {{/* Wide-rim margarita glass */}}
  <path d="M1 5h22l-8 7H9L1 5z"/>
  <path d="M9 12l-1 5h8l-1-5"/>
  <line x1="10" y1="17" x2="14" y2="17"/>
  <line x1="8" y1="20" x2="16" y2="20"/>
{{- else if eq $type "vin" -}}
  {{/* Wine glass */}}
  <path d="M8 3h8l-2 8a4 4 0 0 1-4 0L8 3z"/>
  <line x1="12" y1="15" x2="12" y2="20"/>
  <line x1="9" y1="20" x2="15" y2="20"/>
{{- else -}}
  {{/* Generic glass fallback */}}
  <path d="M6 4h12l-2 16H8L6 4z"/>
{{- end -}}
</svg>
