<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ .Title }} — {{ .Site.Title }} - Mocktail, cocktail sans alcool</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
  <meta name="version" content="{{ .Site.Params.version }}">
</head>
<body>

  <header class="site-header">
    <a href="/" class="site-logo">Kanpai Ø</a>
  </header>

  <main class="recipe">

    <figure class="recipe__photo">
      <img src="/images/recettes/{{ .Params.slug }}.webp" alt="{{ .Title }}">
    </figure>

    <aside class="recipe__card">
      <ul class="recipe__ingredients">
        {{ range .Params.ingredients }}
        <li><span>{{ . }}</span></li>
        {{ end }}
      </ul>
    </aside>

    <div class="recipe__info">
      <h1 class="recipe__title">{{ .Title }}</h1>
    </div>

  </main>

</body>
</html>
